name: Build and Deploy r-image-magic

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/akaich00/r-image-magic
  AWS_REGION: us-east-1
  ECS_CLUSTER: akaich00-cluster
  ECS_SERVICE: r-image-magic
  ECS_TASK_FAMILY: r-image-magic

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  build:
    name: Build & Push ARM64 Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}

    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up QEMU (for ARM64 cross-compile)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.vars.outputs.sha_short }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::286119371519:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Get GHCR pull secret ARN
        id: ghcr-secret
        run: |
          # Reuse existing GHCR credentials (shared across apps)
          GHCR_SECRET_ARN=$(aws secretsmanager describe-secret --secret-id "teeswim/ghcr-credentials" --query 'ARN' --output text 2>/dev/null || true)
          if [ -z "$GHCR_SECRET_ARN" ] || [ "$GHCR_SECRET_ARN" = "None" ]; then
            echo "⚠️ No GHCR secret found — ECS will only pull public images"
            echo "arn=" >> $GITHUB_OUTPUT
          else
            echo "arn=$GHCR_SECRET_ARN" >> $GITHUB_OUTPUT
            echo "✅ Using GHCR secret: $GHCR_SECRET_ARN"
          fi

      - name: Ensure CloudWatch log group exists
        run: |
          aws logs create-log-group --log-group-name /ecs/r-image-magic 2>/dev/null || true

      - name: Register task definition
        id: register-task
        run: |
          IMAGE_URI="${{ env.IMAGE }}:${{ needs.build.outputs.image_tag }}"
          GHCR_SECRET_ARN="${{ steps.ghcr-secret.outputs.arn }}"

          TASK_DEF=$(cat <<'TASKEOF'
          {
            "family": "r-image-magic",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "1024",
            "memory": "2048",
            "runtimePlatform": {
              "cpuArchitecture": "ARM64",
              "operatingSystemFamily": "LINUX"
            },
            "executionRoleArn": "arn:aws:iam::286119371519:role/ecsTaskExecutionRole",
            "containerDefinitions": [
              {
                "name": "r-image-magic",
                "essential": true,
                "portMappings": [{"containerPort": 8080, "protocol": "tcp"}],
                "environment": [
                  {"name": "RUST_LOG", "value": "info"},
                  {"name": "MOCKUP__SERVER__HOST", "value": "0.0.0.0"},
                  {"name": "MOCKUP__SERVER__PORT", "value": "8080"}
                ],
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group": "/ecs/r-image-magic",
                    "awslogs-region": "us-east-1",
                    "awslogs-stream-prefix": "ecs"
                  }
                },
                "healthCheck": {
                  "command": ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"],
                  "interval": 30,
                  "timeout": 5,
                  "retries": 3,
                  "startPeriod": 60
                }
              }
            ]
          }
          TASKEOF
          )

          # Inject dynamic values (image URI, GHCR credentials, DATABASE_URL)
          if [ -n "$GHCR_SECRET_ARN" ]; then
            TASK_DEF=$(echo "$TASK_DEF" | jq \
              --arg img "$IMAGE_URI" \
              --arg ghcr_arn "$GHCR_SECRET_ARN" \
              --arg db_url "${{ secrets.MOCKUP_DATABASE_URL }}" \
              '.containerDefinitions[0].image = $img |
               .containerDefinitions[0].repositoryCredentials = {"credentialsParameter": $ghcr_arn} |
               .containerDefinitions[0].environment += [{"name": "MOCKUP__DATABASE__URL", "value": $db_url}]')
          else
            TASK_DEF=$(echo "$TASK_DEF" | jq \
              --arg img "$IMAGE_URI" \
              --arg db_url "${{ secrets.MOCKUP_DATABASE_URL }}" \
              '.containerDefinitions[0].image = $img |
               .containerDefinitions[0].environment += [{"name": "MOCKUP__DATABASE__URL", "value": $db_url}]')
          fi

          # Register the task definition
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task_arn=$NEW_ARN" >> $GITHUB_OUTPUT
          echo "✅ Registered task definition: $NEW_ARN"

      - name: Update ECS service
        run: |
          # Check if service exists
          if aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.ECS_SERVICE }} --query 'services[0].status' --output text 2>/dev/null | grep -q ACTIVE; then
            echo "Updating existing service..."
            aws ecs update-service \
              --cluster ${{ env.ECS_CLUSTER }} \
              --service ${{ env.ECS_SERVICE }} \
              --task-definition ${{ steps.register-task.outputs.task_arn }} \
              --force-new-deployment
          else
            echo "⚠️ ECS service '${{ env.ECS_SERVICE }}' not found on cluster '${{ env.ECS_CLUSTER }}'."
            echo "Create it manually first (needs target group, subnets, security groups)."
            echo "See: SHARED_INFRA.md steps 4-5"
            exit 1
          fi

      - name: Wait for deployment stability
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }}
          echo "✅ Deployment complete: r-image-magic → ${{ needs.build.outputs.image_tag }}"
