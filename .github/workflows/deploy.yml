name: Build and Deploy r-image-magic

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/r-image-magic

jobs:
  build:
    name: Build & Push ARM64 Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      sha: ${{ steps.vars.outputs.sha_short }}

    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up QEMU (for ARM64 cross-compile)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Update GitOps Manifest
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout k8s-deployments repo
        uses: actions/checkout@v4
        with:
          repository: AKAICH00/k8s-deployments
          token: ${{ secrets.K8S_DEPLOYMENTS_PAT }}
          path: k8s-deployments

      - name: Update image tag in manifest
        run: |
          cd k8s-deployments
          if [ -f apps/r-image-magic/deployment.yaml ]; then
            sed -i "s|image: ghcr.io/akaich00/r-image-magic:.*|image: ghcr.io/akaich00/r-image-magic:${{ needs.build.outputs.sha }}|g" apps/r-image-magic/deployment.yaml
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git diff --staged --quiet || git commit -m "deploy(r-image-magic): ${{ needs.build.outputs.sha }}"
            git push
            echo "✅ Manifest updated: r-image-magic → ${{ needs.build.outputs.sha }}"
          else
            echo "ℹ️ No manifest at apps/r-image-magic/deployment.yaml — ECS manages deployment via Terraform"
          fi
