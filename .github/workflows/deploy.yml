name: Build and Deploy r-image-magic

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::286119371519:role/github-actions-deploy
          aws-region: us-east-1

      - name: Set up QEMU (for ARM64 cross-compile)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/akaich00/r-image-magic:latest
            ghcr.io/akaich00/r-image-magic:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ensure GHCR pull credentials secret
        id: ghcr-secret
        env:
          GHCR_USERNAME: akaich00
          GHCR_PASSWORD: ${{ secrets.CR_PAT }}
        run: |
          set -euo pipefail

          SECRET_NAME="teeswim/ghcr-credentials"
          SECRET_PAYLOAD=$(jq -n \
            --arg username "$GHCR_USERNAME" \
            --arg password "$GHCR_PASSWORD" \
            '{username: $username, password: $password}')

          GHCR_SECRET_ARN=$(aws secretsmanager put-secret-value \
            --secret-id "$SECRET_NAME" \
            --secret-string "$SECRET_PAYLOAD" \
            --query 'ARN' --output text 2>/dev/null || true)

          if [ -z "${GHCR_SECRET_ARN:-}" ] || [ "$GHCR_SECRET_ARN" = "None" ]; then
            GHCR_SECRET_ARN=$(aws secretsmanager create-secret \
              --name "$SECRET_NAME" \
              --secret-string "$SECRET_PAYLOAD" \
              --query 'ARN' --output text)
          fi

          echo "ghcr_secret_arn=$GHCR_SECRET_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS
        run: |
          IMAGE="ghcr.io/akaich00/r-image-magic:${{ github.sha }}"
          DB_URL="${{ secrets.MOCKUP_DATABASE_URL }}"

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition r-image-magic \
            --query 'taskDefinition' --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "$IMAGE" \
            --arg GHCR_SECRET_ARN "${{ steps.ghcr-secret.outputs.ghcr_secret_arn }}" \
            --arg DB_URL "$DB_URL" \
            '.containerDefinitions[0].image = $IMAGE |
             .containerDefinitions[0].repositoryCredentials = {credentialsParameter: $GHCR_SECRET_ARN} |
             .containerDefinitions[0].environment |= (
               [.[]? | select(.name != "MOCKUP__DATABASE__URL")] +
               [{"name": "MOCKUP__DATABASE__URL", "value": $DB_URL}]
             ) |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                 .compatibilities, .registeredAt, .registeredBy)')

          NEW_REVISION=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service \
            --cluster akaich00-cluster \
            --service r-image-magic \
            --task-definition "$NEW_REVISION" \
            --force-new-deployment

          aws ecs wait services-stable \
            --cluster akaich00-cluster \
            --services r-image-magic

          echo "✅ Deployed r-image-magic → ${{ github.sha }}"
